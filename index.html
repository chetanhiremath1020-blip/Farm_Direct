<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FarmDirect — B2B Farm-to-Retailer Marketplace</title>

<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-50:#f0fdf4;--green-100:#dcfce7;--green-500:#22c55e;--green-600:#16a34a;--green-700:#15803d;--green-800:#166534;--green-900:#14532d;
  --amber-50:#fffbeb;--amber-100:#fef3c7;--amber-400:#fbbf24;--amber-500:#f59e0b;--amber-600:#d97706;
  --red-50:#fef2f2;--red-500:#ef4444;--red-600:#dc2626;
  --stone-50:#fafaf9;--stone-100:#f5f4f2;--stone-200:#e7e5e4;--stone-300:#d6d3d1;--stone-400:#a8a29e;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;--stone-800:#292524;--stone-900:#1c1917;
  --blue-50:#eff6ff;--blue-500:#3b82f6;--blue-600:#2563eb;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);--shadow-lg:0 12px 32px rgba(0,0,0,.12);
  --font:'Inter',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--stone-50);color:var(--stone-800);line-height:1.5;min-height:100vh;}
#root{min-height:100vh;}
button{cursor:pointer;font-family:inherit;border:none;outline:none;}
input,textarea,select{font-family:inherit;outline:none;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;}

/* Utility */
.spinner{width:32px;height:32px;border:3px solid var(--green-100);border-top-color:var(--green-600);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600;}
.badge-green{background:var(--green-100);color:var(--green-700);}
.badge-amber{background:var(--amber-100);color:var(--amber-600);}
.badge-red{background:var(--red-50);color:var(--red-600);}
.badge-blue{background:var(--blue-50);color:var(--blue-600);}

/* Navbar */
.navbar{position:sticky;top:0;z-index:100;background:rgba(20,83,45,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);padding:0 24px;}
.navbar-inner{max-width:1200px;margin:0 auto;height:60px;display:flex;align-items:center;gap:16px;}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;color:#fff;cursor:pointer;}
.nav-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#22c55e,#15803d);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:24px;}
.nav-link{padding:6px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:rgba(255,255,255,.75);cursor:pointer;transition:.15s;}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,.1);}
.nav-spacer{flex:1;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 18px;border-radius:var(--radius-md);font-size:14px;font-weight:600;transition:.15s;cursor:pointer;}
.btn-primary{background:var(--green-600);color:#fff;}
.btn-primary:hover{background:var(--green-700);}
.btn-secondary{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);}
.btn-secondary:hover{background:rgba(255,255,255,.2);}
.btn-amber{background:var(--amber-500);color:#fff;}
.btn-amber:hover{background:var(--amber-600);}
.btn-outline{background:transparent;color:var(--green-700);border:1.5px solid var(--green-600);}
.btn-outline:hover{background:var(--green-50);}
.btn-danger{background:var(--red-500);color:#fff;}
.btn-danger:hover{background:var(--red-600);}
.btn-ghost{background:transparent;color:var(--stone-600);}
.btn-ghost:hover{background:var(--stone-100);}
.btn-sm{padding:6px 14px;font-size:13px;}
.btn-lg{padding:12px 28px;font-size:15px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* Form */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.form-label{font-size:13px;font-weight:600;color:var(--stone-700);}
.form-input{padding:10px 14px;border:1.5px solid var(--stone-200);border-radius:var(--radius-md);font-size:14px;color:var(--stone-800);background:#fff;transition:.15s;}
.form-input:focus{border-color:var(--green-500);box-shadow:0 0 0 3px rgba(34,197,94,.12);}
.form-select{padding:10px 14px;border:1.5px solid var(--stone-200);border-radius:var(--radius-md);font-size:14px;color:var(--stone-800);background:#fff;appearance:none;cursor:pointer;}
.form-select:focus{border-color:var(--green-500);}
.form-textarea{padding:10px 14px;border:1.5px solid var(--stone-200);border-radius:var(--radius-md);font-size:14px;color:var(--stone-800);background:#fff;resize:vertical;min-height:80px;}
.form-textarea:focus{border-color:var(--green-500);}
.form-hint{font-size:12px;color:var(--stone-400);}

/* Card */
.card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--stone-200);box-shadow:var(--shadow-sm);}
.card-hover{transition:.2s;}
.card-hover:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}

/* Page layout */
.page-container{max-width:1200px;margin:0 auto;padding:32px 24px;}
.page-header{margin-bottom:28px;}
.page-title{font-size:26px;font-weight:800;color:var(--stone-900);}
.page-subtitle{font-size:15px;color:var(--stone-500);margin-top:4px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:20px;font-weight:800;color:var(--stone-900);}
.modal-close{background:var(--stone-100);border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--stone-500);}
.modal-close:hover{background:var(--stone-200);}
.modal-body{padding:24px;}

/* Toast */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;border-radius:var(--radius-md);font-size:14px;font-weight:500;color:#fff;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;}
.toast-success{background:var(--green-700);}
.toast-error{background:var(--red-600);}
.toast-info{background:var(--blue-600);}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* Hero */
.hero{min-height:92vh;background:linear-gradient(145deg,#0d4a24 0%,#14532d 40%,#166534 100%);position:relative;display:flex;align-items:center;overflow:hidden;}
.hero-canvas{position:absolute;inset:0;width:100%;height:100%;}
.hero-content{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:60px 24px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:20px;}
.hero-title{font-size:54px;font-weight:900;color:#fff;line-height:1.08;letter-spacing:-1.5px;}
.hero-title-accent{color:var(--amber-400);}
.hero-desc{font-size:17px;color:rgba(255,255,255,.75);line-height:1.65;margin:20px 0 32px;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;}
.hero-stats{display:flex;gap:32px;margin-top:48px;padding-top:32px;border-top:1px solid rgba(255,255,255,.12);}
.stat-item{display:flex;flex-direction:column;gap:2px;}
.stat-val{font-size:26px;font-weight:800;color:#fff;}
.stat-label{font-size:13px;color:rgba(255,255,255,.6);}

/* Marketplace grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.product-card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--stone-200);overflow:hidden;transition:.2s;cursor:pointer;}
.product-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);}
.product-img{width:100%;height:180px;object-fit:cover;background:var(--green-50);display:flex;align-items:center;justify-content:center;font-size:48px;}
.product-body{padding:16px;}
.product-name{font-size:16px;font-weight:700;color:var(--stone-900);margin-bottom:4px;}
.product-farm{font-size:13px;color:var(--stone-500);}
.product-price{font-size:18px;font-weight:800;color:var(--green-700);margin:10px 0 4px;}
.product-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.product-footer{padding:12px 16px;border-top:1px solid var(--stone-100);display:flex;gap:8px;}

/* Filters bar */
.filters-bar{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.search-input{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--stone-200);border-radius:var(--radius-md);font-size:14px;}
.search-input:focus{border-color:var(--green-500);}

/* Dashboard stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);padding:20px;display:flex;align-items:center;gap:16px;}
.stat-icon{width:48px;height:48px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.stat-info{flex:1;}
.stat-info-val{font-size:22px;font-weight:800;color:var(--stone-900);}
.stat-info-label{font-size:13px;color:var(--stone-500);margin-top:2px;}

/* Orders */
.order-row{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.order-icon{width:44px;height:44px;border-radius:var(--radius-md);background:var(--green-50);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.order-info{flex:1;min-width:0;}
.order-name{font-size:15px;font-weight:700;color:var(--stone-900);}
.order-meta{font-size:13px;color:var(--stone-500);margin-top:2px;}
.progress-bar{height:6px;border-radius:3px;background:var(--stone-100);overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;border-radius:3px;background:var(--green-500);transition:width .5s;}

/* Chat */
.chat-layout{display:grid;grid-template-columns:280px 1fr;gap:0;height:calc(100vh - 120px);background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);overflow:hidden;}
.chat-sidebar{border-right:1px solid var(--stone-200);display:flex;flex-direction:column;}
.chat-sidebar-header{padding:16px;border-bottom:1px solid var(--stone-200);font-size:15px;font-weight:700;color:var(--stone-900);}
.chat-thread{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--stone-100);transition:.1s;}
.chat-thread:hover,.chat-thread.active{background:var(--green-50);}
.chat-thread-name{font-size:14px;font-weight:600;color:var(--stone-800);}
.chat-thread-preview{font-size:12px;color:var(--stone-400);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-main{display:flex;flex-direction:column;}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--stone-200);font-size:15px;font-weight:700;color:var(--stone-900);}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;}
.msg-me{background:var(--green-600);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.msg-other{background:var(--stone-100);color:var(--stone-800);align-self:flex-start;border-bottom-left-radius:4px;}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--stone-200);display:flex;gap:10px;}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--stone-200);border-radius:var(--radius-md);font-size:14px;}
.chat-input:focus{border-color:var(--green-500);}

/* Sections */
.section{padding:72px 24px;}
.section-dark{background:var(--stone-900);}
.section-center{text-align:center;}
.section-title{font-size:34px;font-weight:800;color:var(--stone-900);letter-spacing:-.5px;}
.section-subtitle{font-size:16px;color:var(--stone-500);margin-top:10px;}
.section-title-white{color:#fff;}
.section-subtitle-white{color:rgba(255,255,255,.6);}
.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;margin-top:48px;}
.feature-card{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-xl);padding:28px;transition:.2s;}
.feature-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);}
.feature-icon{width:52px;height:52px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;}
.feature-title{font-size:17px;font-weight:700;color:var(--stone-900);margin-bottom:8px;}
.feature-desc{font-size:14px;color:var(--stone-500);line-height:1.6;}

/* Loading */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:var(--stone-50);}

/* Auth tabs */
.auth-tabs{display:flex;border-bottom:2px solid var(--stone-100);margin-bottom:24px;}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;color:var(--stone-400);cursor:pointer;transition:.15s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.auth-tab.active{color:var(--green-700);border-bottom-color:var(--green-600);}
.role-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.role-card{padding:16px;border:2px solid var(--stone-200);border-radius:var(--radius-md);cursor:pointer;text-align:center;transition:.15s;}
.role-card.selected{border-color:var(--green-500);background:var(--green-50);}
.role-card-icon{font-size:26px;margin-bottom:8px;}
.role-card-title{font-size:14px;font-weight:700;color:var(--stone-800);}
.role-card-desc{font-size:12px;color:var(--stone-500);margin-top:3px;}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--stone-400);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:600;color:var(--stone-500);margin-bottom:6px;}
.empty-desc{font-size:14px;color:var(--stone-400);}

/* Profile */
.profile-header{background:linear-gradient(135deg,#14532d,#166534);padding:40px 24px;display:flex;align-items:center;gap:24px;border-radius:var(--radius-xl) var(--radius-xl) 0 0;}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:36px;border:3px solid rgba(255,255,255,.3);}
.profile-name{font-size:22px;font-weight:800;color:#fff;}
.profile-role{font-size:14px;color:rgba(255,255,255,.7);margin-top:3px;}

/* How it works */
.steps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:24px;margin-top:48px;}
.step-card{text-align:center;padding:32px 20px;}
.step-num{width:52px;height:52px;border-radius:50%;background:var(--green-600);color:#fff;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.step-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;}
.step-desc{font-size:14px;color:rgba(255,255,255,.6);}

/* Responsive */
@media(max-width:768px){
  .hero-content{grid-template-columns:1fr;}
  .hero-title{font-size:36px;}
  .hero-stats{gap:20px;}
  .stat-val{font-size:20px;}
  .chat-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .chat-sidebar{max-height:200px;}
  .nav-links{display:none;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ── Firebase init ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCiKwjxLl5QVIRtico5jCNsJOo5NTMrY1I",
  authDomain: "farm-direct-ab31b.firebaseapp.com",
  projectId: "farm-direct-ab31b",
  storageBucket: "farm-direct-ab31b.firebasestorage.app",
  messagingSenderId: "984132079860",
  appId: "1:984132079860:web:3f2b1ac2582a76c8e58ea1",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ── Helpers ───────────────────────────────────────────────────────────────────
const { useState, useEffect, useRef, useContext, createContext, useCallback } = React;

function fmtCurrency(n) {
  return "₹" + Number(n || 0).toLocaleString("en-IN");
}
function fmtDate(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
}
const CATEGORIES = ["Vegetables","Fruits","Grains","Dairy","Spices","Pulses","Oilseeds","Other"];
const UNITS = ["kg","quintal","ton","dozen","litre","piece","bag"];
const STATES = ["Maharashtra","Punjab","Haryana","Uttar Pradesh","Karnataka","Gujarat","Rajasthan","Madhya Pradesh","Tamil Nadu","Andhra Pradesh","West Bengal","Bihar","Telangana","Kerala","Odisha"];
const PROD_EMOJIS = {"Vegetables":"🥦","Fruits":"🍎","Grains":"🌾","Dairy":"🥛","Spices":"🌶️","Pulses":"🫘","Oilseeds":"🌻","Other":"📦"};

// ── Toast context ─────────────────────────────────────────────────────────────
const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type="success") => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// ── Auth context ──────────────────────────────────────────────────────────────
const AuthCtx = createContext(null);
function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (u) => {
      setUser(u);
      if (u) {
        const doc = await db.collection("users").doc(u.uid).get();
        setProfile(doc.exists ? doc.data() : null);
      } else {
        setProfile(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);
  const refreshProfile = async () => {
    if (!user) return;
    const doc = await db.collection("users").doc(user.uid).get();
    setProfile(doc.exists ? doc.data() : null);
  };
  return (
    <AuthCtx.Provider value={{ user, profile, loading, refreshProfile, role: profile?.role }}>
      {children}
    </AuthCtx.Provider>
  );
}
const useAuth = () => useContext(AuthCtx);

// ── Navbar ────────────────────────────────────────────────────────────────────
function Navbar({ page, navigate, openAuth }) {
  const { user, profile, role } = useAuth();
  const toast = useToast();
  const signOut = async () => {
    await auth.signOut();
    toast("Signed out", "info");
    navigate("home");
  };
  const farmerLinks = [
    { key:"dashboard", label:"Dashboard" },
    { key:"products", label:"My Products" },
    { key:"add-product", label:"+ Add Product" },
    { key:"orders", label:"Orders" },
    { key:"messages", label:"Messages" },
    { key:"field-visits", label:"Field Visits" },
  ];
  const retailerLinks = [
    { key:"marketplace", label:"Marketplace" },
    { key:"orders", label:"My Orders" },
    { key:"messages", label:"Messages" },
    { key:"field-visits", label:"Field Visits" },
  ];
  const links = role === "farmer" ? farmerLinks : role === "retailer" ? retailerLinks : [];
  return (
    <nav className="navbar">

// ── Hero canvas ───────────────────────────────────────────────────────────────
function HeroCanvas() {
  const ref = useRef(null);
  const anim = useRef(0);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth || 800;
    canvas.height = canvas.offsetHeight || 500;
    const particles = Array.from({length:55}, () => ({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      vx:(Math.random()-.5)*.5, vy:(Math.random()-.5)*.5,
      r:Math.random()*3+1,
      c:["#4ade80","#86efac","#fbbf24","#d1fae5"][Math.floor(Math.random()*4)],
      o:Math.random()*.5+.2,
    }));
    let t = 0;
    const draw = () => {
      t += .008;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const W = canvas.width, H = canvas.height, cx = W/2, cy = H*.55;
      // Ground
      const g = ctx.createLinearGradient(0,cy,0,H);
      g.addColorStop(0,"#15803d"); g.addColorStop(1,"#14532d");
      ctx.fillStyle=g; ctx.fillRect(0,cy,W,H);
      // Barn
      ctx.save(); ctx.translate(cx-90,cy-70);
      ctx.fillStyle="#b91c1c"; ctx.fillRect(0,20,110,90);
      ctx.fillStyle="#7f1d1d"; ctx.beginPath(); ctx.moveTo(-15,20); ctx.lineTo(55,-28); ctx.lineTo(125,20); ctx.closePath(); ctx.fill();
      ctx.fillStyle="#92400e"; ctx.fillRect(38,68,34,42); ctx.restore();
      // Silo
      ctx.save(); ctx.translate(cx+90,cy-85);
      ctx.fillStyle="#d6d3d1"; ctx.fillRect(0,20,32,100);
      ctx.beginPath(); ctx.arc(16,20,16,Math.PI,0); ctx.fillStyle="#a8a29e"; ctx.fill(); ctx.restore();
      // Trees
      [[cx-210,cy-15],[cx+195,cy-5],[cx-260,cy]].forEach(([tx,ty])=>{
        ctx.save(); ctx.translate(tx,ty);
        ctx.fillStyle="#78350f"; ctx.fillRect(-5,0,10,50);
        ctx.beginPath(); ctx.arc(0,-15,28,0,Math.PI*2); ctx.fillStyle="#15803d"; ctx.fill(); ctx.restore();
      });
      // Crops
      for(let i=-5;i<=5;i++){
        ctx.save(); ctx.translate(cx+i*30,cy-5+Math.sin(t*2+i)*4);
        ctx.fillStyle="#22c55e"; ctx.fillRect(-3,0,6,24);
        ctx.beginPath(); ctx.arc(0,-8,12,0,Math.PI*2); ctx.fillStyle="#16a34a"; ctx.fill(); ctx.restore();
      }
      // Floating orbs
      [{ox:cx-190,oy:cy-160,c:"#ef4444",p:0},{ox:cx+210,oy:cy-130,c:"#fbbf24",p:1.5},{ox:cx-110,oy:cy-210,c:"#a78bfa",p:3},{ox:cx+140,oy:cy-190,c:"#22c55e",p:4.5}].forEach(({ox,oy,c,p})=>{
        const fy = Math.sin(t+p)*14;
        ctx.save(); ctx.translate(ox,oy+fy);
        const og = ctx.createRadialGradient(-4,-4,0,0,0,20);
        og.addColorStop(0,c+"ee"); og.addColorStop(1,c+"33");
        ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fillStyle=og; ctx.fill(); ctx.restore();
      });
      // Particles
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        ctx.save(); ctx.globalAlpha=p.o;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.c; ctx.fill(); ctx.restore();
      });
      anim.current = requestAnimationFrame(draw);
    };
    draw();
    const onResize = () => { canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; };
    window.addEventListener("resize",onResize);
    return () => { cancelAnimationFrame(anim.current); window.removeEventListener("resize",onResize); };
  },[]);
  return <canvas ref={ref} className="hero-canvas"/>;
}

function AuthModal({ tab: initTab, onClose }) {
  const [tab, setTab] = useState(initTab || "login");
  const [role, setRole] = useState("retailer");
  const [form, setForm] = useState({ name:"", email:"", password:"", farmName:"", storeName:"", location:"" });

  const toast = useToast();
  const { refreshProfile } = useAuth();
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const doLogin = async () => {
    setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(form.email, form.password);
      await refreshProfile();
      toast("Welcome back! 👋");
      onClose();
    } catch(e) { toast(e.message,"error"); }
    setLoading(false);
  };

  const doRegister = async () => {
    setLoading(true);

      const cred = await auth.createUserWithEmailAndPassword(form.email, form.password);

function MarketplacePage({ navigate, openAuth }) {
  const { user, role } = useAuth();
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("");
  const [loc, setLoc] = useState("");
  const [organic, setOrganic] = useState(false);
  const [selected, setSelected] = useState(null);
  const [qty, setQty] = useState(1);
  const [ordering, setOrdering] = useState(false);
  const toast = useToast();
  const { profile } = useAuth();

  useEffect(()=>{
    setLoading(true);
    let q = db.collection("products").orderBy("createdAt","desc").limit(60);
    const unsub = q.onSnapshot(snap=>{
      setProducts(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    }, ()=>setLoading(false));
    return unsub;
  },[]);

  const filtered = products.filter(p=>{
    const s = search.toLowerCase();
    if(s && !p.name?.toLowerCase().includes(s) && !p.location?.toLowerCase().includes(s) && !p.farmName?.toLowerCase().includes(s)) return false;
    if(cat && p.category!==cat) return false;
    if(loc && p.location!==loc) return false;
    if(organic && !p.organic) return false;
    return true;
  });

  const placeOrder = async () => {
    if(!user) { openAuth("login"); return; }
    if(role!=="retailer") { toast("Only retailers can place orders","error"); return; }
    setOrdering(true);
    try {
      const total = qty * selected.price;
      await db.collection("orders").add({
        productId:selected.id, productName:selected.name,
        farmerId:selected.farmerId, retailerId:user.uid,
        farmerName:selected.farmName||"Farmer", retailerName:profile?.storeName||profile?.name||"Retailer",
        quantity:qty, unit:selected.unit, totalAmount:total,
        status:"pending", createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      toast(`Order placed! ₹${total.toLocaleString("en-IN")} for ${qty} ${selected.unit} of ${selected.name} 🎉`);
      setSelected(null); setQty(1);
    } catch(e) { toast(e.message,"error"); }
    setOrdering(false);
  };

  return (
    <div className="page-container">
      <div className="page-header">
        <div className="page-title">🛒 Marketplace</div>
        <div className="page-subtitle">Fresh produce directly from verified farms</div>
      </div>
      <div className="filters-bar">
        <input className="search-input" placeholder="🔍 Search produce, farm, location..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="form-select" style={{minWidth:140}} value={cat} onChange={e=>setCat(e.target.value)}>
          <option value="">All Categories</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select className="form-select" style={{minWidth:140}} value={loc} onChange={e=>setLoc(e.target.value)}>
          <option value="">All States</option>
          {STATES.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:14,fontWeight:600,color:"var(--stone-600)",cursor:"pointer",whiteSpace:"nowrap"}}>
          <input type="checkbox" checked={organic} onChange={e=>setOrganic(e.target.checked)} style={{width:16,height:16}}/>
          Organic only
        </label>
      </div>
      {loading ? <div style={{display:"flex",justifyContent:"center",padding:60}}><div className="spinner"/></div>
        : filtered.length===0 ? <div className="empty-state"><div className="empty-icon">🌱</div><div className="empty-title">No products found</div><div className="empty-desc">Try adjusting your filters</div></div>
        : <div className="product-grid">
          {filtered.map(p=>(
            <div key={p.id} className="product-card" onClick={()=>{setSelected(p);setQty(1);}}>
              <div className="product-img" style={{background:"var(--green-50)"}}>
                {p.images?.[0] ? <img src={p.images[0]} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:52}}>{PROD_EMOJIS[p.category]||"📦"}</span>}
              </div>
              <div className="product-body">
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                  {p.organic && <span className="badge badge-green">🌿 Organic</span>}
                  <span className="badge" style={{background:"var(--stone-100)",color:"var(--stone-600)"}}>{p.category}</span>
                </div>
                <div className="product-name">{p.name}</div>
                <div className="product-farm">🏡 {p.farmName||"Farm"} · {p.location}</div>
                <div className="product-price">{fmtCurrency(p.price)} <span style={{fontSize:13,fontWeight:500,color:"var(--stone-400)"}}>/ {p.unit}</span></div>
                {p.quantity && <div style={{fontSize:13,color:"var(--stone-500)"}}>Available: {p.quantity} {p.unit}</div>}
              </div>
              <div className="product-footer">
                <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={e=>{e.stopPropagation();setSelected(p);setQty(1);}}>Order Now</button>
                <button className="btn btn-outline btn-sm" onClick={e=>{e.stopPropagation();if(!user)openAuth("login");else navigate("messages");}}>💬 Chat</button>
              </div>
            </div>
          ))}
        </div>
      }
      {selected && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setSelected(null)}>
          <div className="modal-box">
            <div className="modal-header">
              <span className="modal-title">Place Order</span>
              <button className="modal-close" onClick={()=>setSelected(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{background:"var(--green-50)",borderRadius:"var(--radius-md)",padding:"14px 16px",marginBottom:20}}>
                <div style={{fontWeight:700,fontSize:16}}>{selected.name}</div>
                <div style={{fontSize:13,color:"var(--stone-500)",marginTop:2}}>🏡 {selected.farmName} · {selected.location}</div>
                <div style={{fontSize:18,fontWeight:800,color:"var(--green-700)",marginTop:6}}>{fmtCurrency(selected.price)} / {selected.unit}</div>
              </div>
              <div className="form-group">
                <label className="form-label">Quantity ({selected.unit})</label>
                <input className="form-input" type="number" min="1" max={selected.quantity||9999} value={qty} onChange={e=>setQty(Math.max(1,parseInt(e.target.value)||1))}/>
              </div>
              <div style={{background:"var(--amber-50)",border:"1px solid var(--amber-100)",borderRadius:"var(--radius-md)",padding:"12px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:600,color:"var(--stone-700)"}}>Total Amount</span>
                <span style={{fontWeight:800,fontSize:20,color:"var(--amber-600)"}}>{fmtCurrency(qty*selected.price)}</span>
              </div>
              <button className="btn btn-primary" style={{width:"100%",padding:"12px"}} onClick={placeOrder} disabled={ordering||!user}>
                {!user?"Sign in to Order":ordering?"Placing Order...":"Confirm Order →"}
              </button>
              {!user && <div style={{textAlign:"center",marginTop:10,fontSize:13,color:"var(--stone-400)"}}>
                <span style={{color:"var(--green-600)",fontWeight:600,cursor:"pointer"}} onClick={()=>openAuth("login")}>Sign in</span> or <span style={{color:"var(--green-600)",fontWeight:600,cursor:"pointer"}} onClick={()=>openAuth("register")}>register</span> to place orders
              </div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  const fileRef = useRef();
  const set = k => e => setForm(f=>({...f,[k]: e.target.type==="checkbox"?e.target.checked:e.target.value}));

  const uploadImage = async (file) => {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", "farm_direct");
    const res = await fetch("https://api.cloudinary.com/v1_1/dsndf4khm/image/upload", { method:"POST", body:fd });
    if(!res.ok) throw new Error("Upload failed");
    const data = await res.json();
    return data.secure_url;
  };

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files||[]);
    if(!files.length) return;
    setUploading(true);
    try {
      const urls = await Promise.all(files.map(uploadImage));
      setImages(prev=>[...prev,...urls]);
      toast(`${urls.length} image(s) uploaded ✓`);
    } catch(e) { toast("Image upload failed — check internet connection","error"); }
    setUploading(false);
  };

  const submit = async () => {
    if(!form.name||!form.price||!form.quantity) { toast("Fill in all required fields","error"); return; }
    setSaving(true);
    try {
      await db.collection("products").add({
        ...form, price:parseFloat(form.price), quantity:parseFloat(form.quantity),
        images, farmerId:user.uid, farmName:profile?.farmName||profile?.name,
        farmerEmail:user.email, location:form.location||profile?.location,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      toast("Product listed! 🌾");
      navigate("products");
    } catch(e) { toast(e.message,"error"); }
    setSaving(false);
  };

  return (
    <div className="page-container" style={{maxWidth:680}}>
      <div className="page-header">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>navigate("products")}>← Back</button>
          <div className="page-title">Add New Product</div>
        </div>
      </div>
      <div className="card" style={{padding:28}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div className="form-group" style={{gridColumn:"1/-1"}}>
            <label className="form-label">Product Name *</label>
            <input className="form-input" placeholder="e.g. Fresh Alphonso Mangoes" value={form.name} onChange={set("name")}/>
          </div>

// ── Farmer Dashboard ──────────────────────────────────────────────────────────
function FarmerDashboard({ navigate }) {
  const { user, profile } = useAuth();
  const [stats, setStats] = useState({ products:0, orders:0, revenue:0, pending:0 });
  const [recentOrders, setRecentOrders] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    if(!user) return;
    Promise.all([
      db.collection("products").where("farmerId","==",user.uid).get(),
      db.collection("orders").where("farmerId","==",user.uid).orderBy("createdAt","desc").limit(5).get(),
    ]).then(([pSnap,oSnap])=>{
      const orders = oSnap.docs.map(d=>({id:d.id,...d.data()}));
      const revenue = orders.filter(o=>o.status==="delivered").reduce((s,o)=>s+(o.totalAmount||0),0);
      const pending = orders.filter(o=>o.status==="pending").length;
      setStats({ products:pSnap.size, orders:oSnap.size, revenue, pending });
      setRecentOrders(orders);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[user?.uid]);

  const STATUS_STEPS = ["pending","confirmed","shipped","delivered"];

  if(loading) return <div style={{display:"flex",justifyContent:"center",padding:80}}><div className="spinner"/></div>;

  return (
    <div className="page-container">
      <div className="page-header">
        <div className="page-title">👨‍🌾 Welcome, {profile?.name?.split(" ")[0] || "Farmer"}!</div>
        <div className="page-subtitle">{profile?.farmName} · {profile?.location}</div>
      </div>
      <div className="stats-grid">
        {[
          ["📦","var(--green-50)",stats.products,"Products Listed"],
          ["🛒","var(--amber-50)",stats.orders,"Total Orders"],
          ["💰","var(--blue-50)",fmtCurrency(stats.revenue),"Revenue Earned"],
          ["⏳","var(--red-50)",stats.pending,"Pending Orders"],
        ].map(([icon,bg,val,label])=>(
          <div key={label} className="stat-card">
            <div className="stat-icon" style={{background:bg}}>{icon}</div>
            <div className="stat-info"><div className="stat-info-val">{val}</div><div className="stat-info-label">{label}</div></div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:28}}>
        {[["add-product","+ Add Product","btn-primary"],["products","My Products","btn-outline"],["orders","All Orders","btn-outline"]].map(([p,l,cls])=>(
          <button key={p} className={`btn ${cls}`} onClick={()=>navigate(p)}>{l}</button>
        ))}
      </div>
      {recentOrders.length>0 && <>
        <div style={{fontWeight:700,fontSize:17,color:"var(--stone-900)",marginBottom:14}}>Recent Orders</div>
        {recentOrders.map(o=>(
          <div key={o.id} className="order-row">
            <div className="order-icon">{PROD_EMOJIS[o.category]||"📦"}</div>
            <div className="order-info">
              <div className="order-name">{o.productName}</div>
              <div className="order-meta">Retailer: {o.retailerName} · {o.quantity} {o.unit} · {fmtCurrency(o.totalAmount)}</div>
              <div className="progress-bar"><div className="progress-fill" style={{width:`${((STATUS_STEPS.indexOf(o.status)+1)/4)*100}%`}}/></div>
            </div>
            <span className={`badge ${o.status==="delivered"?"badge-green":o.status==="pending"?"badge-amber":"badge-blue"}`}>{o.status}</span>
          </div>
        ))}
      </>}
    </div>
  );
}

// ── Orders ────────────────────────────────────────────────────────────────────
function OrdersPage({ navigate }) {
  const { user, role } = useAuth();
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const toast = useToast();
  const STATUS_STEPS = ["pending","confirmed","shipped","delivered"];

  useEffect(()=>{
    const field = role==="farmer"?"farmerId":"retailerId";
    const unsub = db.collection("orders").where(field,"==",user.uid).orderBy("createdAt","desc")
      .onSnapshot(snap=>{ setOrders(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); }, ()=>setLoading(false));
    return unsub;
  },[user.uid,role]);

  const advance = async (id, current) => {
    const idx = STATUS_STEPS.indexOf(current);
    if(idx>=STATUS_STEPS.length-1) return;
    await db.collection("orders").doc(id).update({ status:STATUS_STEPS[idx+1] });
    toast("Order status updated ✓");
  };

  return (
    <div className="page-container">
      <div className="page-header">
        <div className="page-title">📦 Orders</div>
        <div className="page-subtitle">{orders.length} order{orders.length!==1?"s":""}</div>
      </div>
      {loading ? <div style={{display:"flex",justifyContent:"center",padding:60}}><div className="spinner"/></div>
        : orders.length===0 ? <div className="empty-state"><div className="empty-icon">📭</div><div className="empty-title">No orders yet</div></div>
        : orders.map(o=>(
          <div key={o.id} className="order-row">
            <div className="order-icon">📦</div>
            <div className="order-info" style={{flex:1}}>
              <div className="order-name">{o.productName}</div>
              <div className="order-meta">
                {role==="farmer"?`Retailer: ${o.retailerName}`:`Farmer: ${o.farmerName}`} · {o.quantity} {o.unit} · {fmtCurrency(o.totalAmount)} · {fmtDate(o.createdAt)}
              </div>
              <div className="progress-bar" style={{marginTop:8}}>
                <div className="progress-fill" style={{width:`${((STATUS_STEPS.indexOf(o.status)+1)/4)*100}%`}}/>
              </div>
              <div style={{display:"flex",gap:6,marginTop:6,fontSize:12}}>
                {STATUS_STEPS.map((s,i)=>(
                  <span key={s} style={{color:i<=STATUS_STEPS.indexOf(o.status)?"var(--green-600)":"var(--stone-300)",fontWeight:i===STATUS_STEPS.indexOf(o.status)?700:500}}>{s}</span>
                ))}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
              <span className={`badge ${o.status==="delivered"?"badge-green":o.status==="pending"?"badge-amber":"badge-blue"}`}>{o.status}</span>
              {role==="farmer" && o.status!=="delivered" && (
                <button className="btn btn-primary btn-sm" onClick={()=>advance(o.id,o.status)}>
                  Mark {STATUS_STEPS[STATUS_STEPS.indexOf(o.status)+1]}
                </button>
              )}
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ── Messages ──────────────────────────────────────────────────────────────────
function MessagesPage() {
  const { user, profile } = useAuth();
  const [threads, setThreads] = useState([]);
  const [active, setActive] = useState(null);
  const [messages, setMessages] = useState([]);
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(true);
  const bottomRef = useRef();
  const toast = useToast();

  useEffect(()=>{
    const unsub = db.collection("chats").where("participants","array-contains",user.uid)
      .orderBy("lastMessageAt","desc")
      .onSnapshot(snap=>{ setThreads(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); }, ()=>setLoading(false));
    return unsub;
  },[user.uid]);

  useEffect(()=>{
    if(!active) return;
    const unsub = db.collection("chats").doc(active.id).collection("messages").orderBy("sentAt","asc")
      .onSnapshot(snap=>{ setMessages(snap.docs.map(d=>({id:d.id,...d.data()}))); });
    return unsub;
  },[active?.id]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  const send = async () => {
    if(!text.trim()||!active) return;
    const t = text; setText("");
    await db.collection("chats").doc(active.id).collection("messages").add({
      text:t, senderId:user.uid, senderName:profile?.name, sentAt:firebase.firestore.FieldValue.serverTimestamp(),
    });
    await db.collection("chats").doc(active.id).update({ lastMessage:t, lastMessageAt:firebase.firestore.FieldValue.serverTimestamp() });
  };

  const otherName = (thread) => {
    const names = thread.participantNames||{};
    return Object.entries(names).find(([uid])=>uid!==user.uid)?.[1] || "User";
  };

  return (
    <div className="page-container">
      <div className="page-header"><div className="page-title">💬 Messages</div></div>
      {loading ? <div style={{display:"flex",justifyContent:"center",padding:60}}><div className="spinner"/></div>
        : threads.length===0 ? <div className="empty-state"><div className="empty-icon">💬</div><div className="empty-title">No conversations yet</div><div className="empty-desc">Conversations start automatically when orders are placed</div></div>
        : <div className="chat-layout">
          <div className="chat-sidebar">
            <div className="chat-sidebar-header">Conversations</div>
            <div style={{flex:1,overflowY:"auto"}}>
              {threads.map(t=>(
                <div key={t.id} className={`chat-thread${active?.id===t.id?" active":""}`} onClick={()=>setActive(t)}>
                  <div className="chat-thread-name">{otherName(t)}</div>
                  <div className="chat-thread-preview">{t.lastMessage||"No messages yet"}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="chat-main">
            {!active
              ? <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--stone-400)"}}>Select a conversation</div>
              : <>
                <div className="chat-header">Chat with {otherName(active)}</div>
                <div className="chat-messages">
                  {messages.map(m=>(
                    <div key={m.id} className={`msg-bubble ${m.senderId===user.uid?"msg-me":"msg-other"}`}>
                      {m.senderId!==user.uid && <div style={{fontSize:11,fontWeight:600,marginBottom:3,opacity:.7}}>{m.senderName}</div>}
                      {m.text}
                    </div>
                  ))}
                  <div ref={bottomRef}/>
                </div>
                <div className="chat-input-row">
                  <input className="chat-input" placeholder="Type a message..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
                  <button className="btn btn-primary" onClick={send}>Send</button>
                </div>
              </>
            }
          </div>
        </div>
      }
    </div>
  );
}

// ── Field Visits ──────────────────────────────────────────────────────────────
function FieldVisitsPage({ navigate }) {
  const { user, profile, role } = useAuth();
  const [visits, setVisits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [farmers, setFarmers] = useState([]);
  const [form, setForm] = useState({ farmerId:"", requestedDate:"", purpose:"Quality check", notes:"" });
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  useEffect(()=>{
    const field = role==="farmer"?"farmerId":"retailerId";
    const unsub = db.collection("fieldVisits").where(field,"==",user.uid).orderBy("createdAt","desc")
      .onSnapshot(snap=>{ setVisits(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); }, ()=>setLoading(false));
    return unsub;
  },[user.uid,role]);

  useEffect(()=>{
    if(role!=="retailer") return;
    db.collection("users").where("role","==","farmer").limit(30).get()
      .then(snap=>setFarmers(snap.docs.map(d=>({id:d.id,...d.data()}))));
  },[role]);

  const submit = async () => {
    if(!form.farmerId||!form.requestedDate) { toast("Select a farmer and date","error"); return; }
    setSaving(true);
    try {
      const farmer = farmers.find(f=>f.uid===form.farmerId||f.id===form.farmerId);
      await db.collection("fieldVisits").add({
        ...form, retailerId:user.uid, retailerName:profile?.storeName||profile?.name,
        farmerName:farmer?.farmName||farmer?.name||"Farmer",
        status:"pending", createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      toast("Field visit requested! 🚜");
      setShowForm(false);
    } catch(e) { toast(e.message,"error"); }
    setSaving(false);
  };

  const updateStatus = async (id, status) => {
    await db.collection("fieldVisits").doc(id).update({ status });
    toast(`Visit marked as ${status}`);
  };

  return (
    <div className="page-container">
      <div className="page-header" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div className="page-title">🚜 Field Visits</div>
          <div className="page-subtitle">{role==="retailer"?"Request farm inspections":"Manage visit requests from retailers"}</div>
        </div>
        {role==="retailer" && <button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ Request Visit</button>}
      </div>
      {loading ? <div style={{display:"flex",justifyContent:"center",padding:60}}><div className="spinner"/></div>
        : visits.length===0 ? <div className="empty-state"><div className="empty-icon">🚜</div><div className="empty-title">No field visits yet</div>{role==="retailer"&&<button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setShowForm(true)}>Request your first visit</button>}</div>
        : visits.map(v=>(
          <div key={v.id} className="order-row">
            <div className="order-icon">🌾</div>
            <div className="order-info" style={{flex:1}}>
              <div className="order-name">{role==="farmer"?`Visit by ${v.retailerName}`:`Visit to ${v.farmerName}`}</div>
              <div className="order-meta">📅 {v.requestedDate} · {v.purpose}</div>
              {v.notes && <div style={{fontSize:13,color:"var(--stone-400)",marginTop:2}}>"{v.notes}"</div>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span className={`badge ${v.status==="confirmed"?"badge-green":v.status==="rejected"?"badge-red":"badge-amber"}`}>{v.status}</span>
              {role==="farmer" && v.status==="pending" && <>
                <button className="btn btn-primary btn-sm" onClick={()=>updateStatus(v.id,"confirmed")}>Confirm</button>
                <button className="btn btn-danger btn-sm" onClick={()=>updateStatus(v.id,"rejected")}>Decline</button>
              </>}
            </div>
          </div>
        ))
      }
      {showForm && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="modal-box">
            <div className="modal-header">
              <span className="modal-title">Request Field Visit</span>
              <button className="modal-close" onClick={()=>setShowForm(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{background:"linear-gradient(135deg,#fffbeb,#fff7ed)",border:"1px solid var(--amber-100)",borderRadius:"var(--radius-md)",padding:"14px 16px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:26}}>🌾</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"var(--stone-800)"}}>Why Book a Field Visit?</div>
                  <div style={{fontSize:13,color:"var(--stone-500)",marginTop:2}}>Inspect crops, assess quality, meet farmers face-to-face before committing to large orders.</div>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Select Farmer</label>
                <select className="form-select" value={form.farmerId} onChange={e=>setForm(f=>({...f,farmerId:e.target.value}))}>
                  <option value="">Choose a farmer...</option>
                  {farmers.map(f=><option key={f.id} value={f.uid||f.id}>{f.farmName||f.name} · {f.location}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Preferred Date</label>
                <input className="form-input" type="date" value={form.requestedDate} min={new Date().toISOString().split("T")[0]} onChange={e=>setForm(f=>({...f,requestedDate:e.target.value}))}/>
              </div>
              <div className="form-group">
                <label className="form-label">Purpose</label>
                <select className="form-select" value={form.purpose} onChange={e=>setForm(f=>({...f,purpose:e.target.value}))}>
                  {["Quality check","Pre-harvest inspection","Partnership discussion","Sample collection","General farm tour"].map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Additional Notes</label>
                <textarea className="form-textarea" placeholder="Any specific requirements..." value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
              </div>
              <button className="btn btn-primary" style={{width:"100%",padding:12}} onClick={submit} disabled={saving}>
                {saving?"Submitting...":"Send Request 🚜"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Profile ───────────────────────────────────────────────────────────────────
function ProfilePage() {
  const { user, profile, refreshProfile } = useAuth();
  const toast = useToast();
  const [form, setForm] = useState({ name:"", location:"", farmName:"", storeName:"" });
  const [saving, setSaving] = useState(false);
  useEffect(()=>{ if(profile) setForm({ name:profile.name||"", location:profile.location||"", farmName:profile.farmName||"", storeName:profile.storeName||"" }); },[profile]);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const save = async () => {
    setSaving(true);
    try {
      await db.collection("users").doc(user.uid).update({ ...form });
      await refreshProfile();
      toast("Profile updated ✓");
    } catch(e) { toast(e.message,"error"); }
    setSaving(false);
  };
  return (
    <div className="page-container" style={{maxWidth:600}}>
      <div className="card">
        <div className="profile-header">
          <div className="profile-avatar">{profile?.role==="farmer"?"👨‍🌾":"🏪"}</div>
          <div>
            <div className="profile-name">{profile?.name}</div>
            <div className="profile-role">{profile?.role==="farmer"?"Farmer":"Retailer"} · {profile?.email}</div>
          </div>
        </div>
        <div style={{padding:28}}>
          <div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" value={form.name} onChange={set("name")}/>
          </div>
          {profile?.role==="farmer"
            ? <div className="form-group"><label className="form-label">Farm Name</label><input className="form-input" value={form.farmName} onChange={set("farmName")}/></div>
            : <div className="form-group"><label className="form-label">Store Name</label><input className="form-input" value={form.storeName} onChange={set("storeName")}/></div>
          }
          <div className="form-group">
            <label className="form-label">Location</label>
            <select className="form-select" value={form.location} onChange={set("location")}>
              <option value="">Select state</option>
              {STATES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <button className="btn btn-primary" style={{width:"100%",padding:12}} onClick={save} disabled={saving}>
            {saving?"Saving...":"Save Changes"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function AppContent() {
  const { user, role, loading } = useAuth();
  const [page, setPage] = useState("home");
  const [authTab, setAuthTab] = useState("login");
  const [authOpen, setAuthOpen] = useState(false);

  const navigate = (p) => { setPage(p); window.scrollTo({top:0,behavior:"smooth"}); };
  const openAuth = (tab="login") => { setAuthTab(tab); setAuthOpen(true); };

  useEffect(()=>{
    if(user && role && page==="home") navigate(role==="farmer"?"dashboard":"marketplace");
  },[user,role]);

  if(loading) return (
    <div className="loading-screen">
      <div style={{width:56,height:56,background:"linear-gradient(135deg,#22c55e,#15803d)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,boxShadow:"0 8px 24px rgba(22,163,74,.35)"}}>🌾</div>
      <div className="spinner"/>
      <div style={{fontSize:14,color:"var(--stone-500)",fontWeight:500}}>Loading FarmDirect...</div>
    </div>
  );

  const PROTECTED = ["dashboard","add-product","products","orders","messages","field-visits","profile"];
  if(PROTECTED.includes(page) && !user) { navigate("home"); openAuth("login"); return null; }

  const renderPage = () => {
    switch(page) {
      case "home": return <HomePage navigate={navigate} openAuth={openAuth}/>;
      case "marketplace": return <MarketplacePage navigate={navigate} openAuth={openAuth}/>;
      case "dashboard": return role==="farmer" ? <FarmerDashboard navigate={navigate}/> : <MarketplacePage navigate={navigate} openAuth={openAuth}/>;
      case "add-product": return <AddProductPage navigate={navigate}/>;
      case "products": return <ProductsPage navigate={navigate}/>;
      case "orders": return <OrdersPage navigate={navigate}/>;
      case "messages": return <MessagesPage/>;
      case "field-visits": return <FieldVisitsPage navigate={navigate}/>;
      case "profile": return <ProfilePage/>;
      default: return <HomePage navigate={navigate} openAuth={openAuth}/>;
    }
  };

  return (
    <>
      <Navbar page={page} navigate={navigate} openAuth={openAuth}/>
      {renderPage()}
      {authOpen && <AuthModal tab={authTab} onClose={()=>setAuthOpen(false)}/>}
    </>
  );
}

function App() {
  return (
    <ToastProvider>
      <AuthProvider>
        <AppContent/>
      </AuthProvider>
    </ToastProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
